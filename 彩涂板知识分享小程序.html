<script>const arts=[
{id:1,cat:1,t:"热镀锌基板（GI）全面解析",d:"热镀锌基板是彩涂板最常用的基板类型，约占基板总量的70%以上。",c:"<h3>什么是热镀锌基板？</h3><p>将冷轧钢板经过连续热镀锌工艺处理，在表面形成锌镀层的产品。</p><h3>生产工艺</h3><p>开卷→脱脂→退火→热浸镀→气刀控厚→冷却→光整→钝化→收卷</p><div class=hb><strong>关键控制点：</strong>锌液温度450-470°C，气刀压力决定镀层厚度。</div><h3>镀层规格</h3><table><tr><th>代号</th><th>g/m2</th><th>用途</th></tr><tr><td>Z60</td><td>60</td><td>室内干燥</td></tr><tr><td>Z100</td><td>100</td><td>建筑外墙</td></tr><tr><td>Z140</td><td>140</td><td>高腐蚀</td></tr><tr><td>Z275</td><td>275</td><td>极端环境</td></tr></table>",v:1280,tg:["基板","热镀锌"]},
{id:2,cat:1,t:"热镀铝锌基板（GL）优势与应用",d:"耐蚀性是纯镀锌的2-4倍，是高端彩涂板的首选基板。",c:"<h3>GL基板</h3><p>镀层成分：55%Al-43.4%Zn-1.6%Si，兼具铝的耐候性和锌的牺牲阳极保护。</p><table><tr><th>性能</th><th>GI</th><th>GL</th></tr><tr><td>耐腐蚀</td><td>良好</td><td>优秀(2-4倍)</td></tr><tr><td>耐热</td><td>~200C</td><td>~315C</td></tr><tr><td>反射率</td><td>中等</td><td>高(节能)</td></tr></table><p>适用于沿海高腐蚀地区、大型厂房、农业温室等。</p>",v:960,tg:["基板","铝锌"]},
{id:3,cat:1,t:"冷轧基板与镀锌基板的区别",d:"了解差异有助于为不同应用场景选择最合适的基板类型。",c:"<h3>冷轧 vs 镀锌</h3><table><tr><th>对比项</th><th>冷轧(CR)</th><th>镀锌(GI/GL)</th></tr><tr><td>表面</td><td>裸钢</td><td>有镀层</td></tr><tr><td>耐腐蚀</td><td>依赖涂层</td><td>双重保护</td></tr><tr><td>成本</td><td>较低</td><td>较高</td></tr><tr><td>适用</td><td>室内干燥</td><td>室外/腐蚀</td></tr></table>",v:720,tg:["基板","冷轧"]},
{id:4,cat:2,t:"彩涂板涂层体系深度解读",d:"PE、SMP、HDP、PVDF四大涂层特点与选型指南。",c:"<h3>四大主流涂层</h3><table><tr><th>类型</th><th>耐候</th><th>加工</th><th>质保</th></tr><tr><td>PE</td><td>2星</td><td>5星</td><td>5-8年</td></tr><tr><td>SMP</td><td>3星</td><td>4星</td><td>8-12年</td></tr><tr><td>HDP</td><td>4星</td><td>4星</td><td>12-15年</td></tr><tr><td>PVDF</td><td>5星</td><td>3星</td><td>20-25年</td></tr></table><p>PE经济耐用、SMP中端均衡、HDP高性价比、PVDF顶级耐候。</p>",v:2150,tg:["涂层","PE","SMP","HDP","PVDF"]},
{id:5,cat:2,t:"PVDF氟碳涂层：高端建筑的保护层",d:"20年+耐候，机场、体育场馆等标志性建筑首选。",c:"<h3>PVDF氟碳涂层</h3><p>聚偏氟乙烯树脂，含氟量不低于70%，C-F键能485kJ/mol。</p><ul><li>佛罗里达暴晒10年E值变化小于5</li><li>耐温-40C至+150C</li><li>自洁性能优异</li></ul><div class=hb>通常提供20-25年品质保证。</div>",v:1850,tg:["涂层","PVDF"]},
{id:6,cat:2,t:"HDP涂层：高性价比之选",d:"以PVDF约60%的成本获得约80%的耐候性能，中高端市场主流。",c:"<h3>HDP高耐久聚酯</h3><p>通过改进聚酯树脂配方，加入特殊耐候添加剂和UV吸收剂。</p><table><tr><th>对比</th><th>HDP</th><th>PVDF</th></tr><tr><td>相对成本</td><td>1.5x</td><td>2.5-3.0x</td></tr><tr><td>T弯</td><td>0-1T</td><td>1-2T</td></tr></table>",v:1430,tg:["涂层","HDP"]},
{id:7,cat:3,t:"彩涂板色差控制技术",d:"E是衡量颜色一致性的核心指标，E小于1.0为人眼难分辨范围。",c:"<h3>色差控制</h3><p>色差(E)是彩涂板质量控制的命脉。</p><h4>产生原因</h4><ul><li>涂料批次差异</li><li>涂布工艺波动</li><li>烘烤温度变化</li></ul><div class=hb><strong>扬子新材标准：</strong>同批次E小于0.5，批次间E小于1.0</div><h4>控制措施</h4><ol><li>来料一单一检</li><li>小样涂布验证</li><li>在线实时监控</li></ol>",v:1680,tg:["色差","质量控制"]},
{id:8,cat:3,t:"颜色标准体系在彩涂板中的应用",d:"RAL、NCS、PANTONE等颜色标准体系在行业中广泛应用。",c:"<h3>主流颜色标准</h3><table><tr><th>体系</th><th>特点</th></tr><tr><td>RAL</td><td>欧洲最普及，213色</td></tr><tr><td>NCS</td><td>科学色彩系统，1950色</td></tr><tr><td>PANTONE</td><td>设计行业，2000+色</td></tr></table><p>中国彩涂板行业最常用RAL色系，编码简洁、稳定。</p>",v:920,tg:["RAL","色卡"]},
{id:9,cat:4,t:"彩涂板在建筑屋面上的应用",d:"轻质高强、色彩丰富、施工便捷，是现代建筑主流屋面材料。",c:"<h3>屋面选型指南</h3><table><tr><th>场景</th><th>基板</th><th>涂层</th></tr><tr><td>工业厂房</td><td>GI Z100</td><td>HDP</td></tr><tr><td>公共建筑</td><td>GL AZ150</td><td>PVDF</td></tr><tr><td>农业温室</td><td>GL AZ70</td><td>PE</td></tr></table><h4>安装要点</h4><ul><li>坡度不低于5%确保排水</li><li>搭接侧向不低于25mm</li><li>使用EPDM垫圈防渗</li></ul>",v:1340,tg:["屋面","建筑"]},
{id:10,cat:4,t:"家电用彩涂板的特殊要求",d:"家电彩涂板对表面质量、加工精度有极高的要求。",c:"<h3>家电彩涂板</h3><table><tr><th>指标</th><th>家电</th><th>建筑</th></tr><tr><td>T弯</td><td>0T</td><td>1-3T</td></tr><tr><td>硬度</td><td>不低于3H</td><td>不低于1H</td></tr><tr><td>耐化学品</td><td>耐油/洗涤剂</td><td>耐酸雨</td></tr></table><p>冰箱面板、洗衣机外壳、空调室外机等白色家电应用。</p>",v:860,tg:["家电","PCM"]},
{id:11,cat:5,t:"彩涂板国家标准 GB/T 12754 解读",d:"彩涂板核心国标，解读分类体系、技术要求和检测方法。",c:"<h3>GB/T 12754-2019</h3><p>最新版本，规定了彩涂板分类、代号和技术要求。</p><h4>关键技术指标</h4><ul><li>外用涂层不低于20um，内用不低于15um</li><li>JW级弯曲不超过3T</li><li>耐盐雾JW不低于480h</li></ul><div class=hb>扬子新材内控：外用涂层不低于25um，耐盐雾不低于720h</div>",v:1560,tg:["标准","GB/T"]},
{id:12,cat:5,t:"彩涂板常见质量缺陷与对策",d:"气泡、针孔、橘皮、色差、划伤……成因与解决方案。",c:"<h3>常见缺陷</h3><table><tr><th>缺陷</th><th>原因</th><th>对策</th></tr><tr><td>气泡</td><td>水分未除尽</td><td>控温</td></tr><tr><td>针孔</td><td>消泡不良</td><td>调配方</td></tr><tr><td>橘皮</td><td>流平性差</td><td>调黏度</td></tr><tr><td>色差</td><td>批次波动</td><td>来料检</td></tr><tr><td>划伤</td><td>导辊磨损</td><td>换辊</td></tr></table>",v:2030,tg:["质量","缺陷"]},
{id:13,cat:6,t:"彩涂板生产工艺全流程",d:"从开卷到包装的全流程解析，了解关键工艺控制点。",c:"<h3>工艺流程</h3><div class=hb>开卷→前处理→化涂→初涂→精涂→检验→覆膜→收卷</div><h4>关键参数</h4><table><tr><th>参数</th><th>范围</th></tr><tr><td>线速度</td><td>60-120 m/min</td></tr><tr><td>初涂PMT</td><td>210-224C</td></tr><tr><td>精涂PMT</td><td>232-249C</td></tr><tr><td>涂布辊压力</td><td>0.3-0.8 MPa</td></tr></table>",v:1170,tg:["工艺","生产"]},
{id:14,cat:7,t:"彩涂板存储与运输注意事项",d:"正确的存储运输方式对保护彩涂板品质至关重要。",c:"<h3>存储规范</h3><table><tr><th>项目</th><th>要求</th></tr><tr><td>湿度</td><td>不超过70%</td></tr><tr><td>温度</td><td>5-45C</td></tr><tr><td>堆放</td><td>竖立，离地不低于100mm</td></tr><tr><td>覆膜产品</td><td>避光，不超过6个月</td></tr></table><div class=hb>严禁用钢丝绳直接起吊！可能导致整卷报废。</div>",v:780,tg:["存储","运输"]},
